# ================================================================
# 无忧辅助 - TrollStore IPA 项目配置
# ================================================================
# 安装 XcodeGen: brew install xcodegen
# 生成项目:    xcodegen generate
# 打开项目:    open 无忧辅助.xcodeproj
#
# 部署目标: iOS 14.0
#   TrollStore 核心支持 iOS 14.0 - 17.0，最小系统定为 14.0
#   因此使用 NavigationView / accentColor / PreviewProvider 等旧 API：
#   NavigationStack 需要 iOS 16+，在 iOS 14/15 上运行时会崩溃
#   Swift Version 保持 5.9（Xcode 15+）兼容

name: 无忧辅助

options:
  bundleIdPrefix: com.wuyou
  deploymentTarget:
    iOS: "14.0"
  # xcodeVersion: "15.0"  # 让 XcodeGen 自动适配当前 Xcode 版本
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"
    TARGETED_DEVICE_FAMILY: "1"
    ARCHS: "arm64"
    VALID_ARCHS: "arm64"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"

targets:
  无忧辅助:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: 无忧辅助
        type: group
    settings:
      base:
        INFOPLIST_FILE: 无忧辅助/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wuyou.helper
        PRODUCT_NAME: 无忧辅助
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_ENTITLEMENTS: entitlements.plist
        ENABLE_BITCODE: "NO"
        CLANG_ENABLE_MODULES: "YES"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
        SWIFT_STRICT_CONCURRENCY: "minimal"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # 将 roothelper 二进制嵌入 app bundle
        # 需要先编译 roothelper: 见 build_helper.sh
    dependencies: []
    preBuildScripts:
      - name: "Copy roothelper"
        script: |
          HELPER_DIR="${SRCROOT}/roothelper"
          HELPER_DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/roothelper"

          if [ -f "${HELPER_DIR}/roothelper" ]; then
            echo "✅ 复制已编译的 roothelper..."
            cp "${HELPER_DIR}/roothelper" "${HELPER_DST}"
            chmod +x "${HELPER_DST}"
          else
            echo "⚠️  roothelper 尚未编译，将尝试编译 (kfd + offsets + main)..."
            SDK=$(xcrun --sdk iphoneos --show-sdk-path)
            clang -arch arm64 -isysroot "$SDK" -mios-version-min=14.0 -O2 \
                  -o "${HELPER_DST}" \
                  "${HELPER_DIR}/main.c" \
                  "${HELPER_DIR}/kfd.c" \
                  "${HELPER_DIR}/offsets.c" \
                  -framework IOKit \
                  -framework CoreFoundation \
                  -framework IOSurface \
                  && chmod +x "${HELPER_DST}" \
                  && echo "✅ roothelper 编译并复制成功" \
                  || echo "❌ roothelper 编译失败，请手动编译"
          fi
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: "Inject entitlements with ldid"
        script: |
          APP_BINARY="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/${PRODUCT_NAME}"
          ENTITLEMENTS="${SRCROOT}/entitlements.plist"
          if command -v ldid &> /dev/null && [ -f "${ENTITLEMENTS}" ] && [ -f "${APP_BINARY}" ]; then
            echo "🔏 注入 entitlements..."
            if ldid -S"${ENTITLEMENTS}" "${APP_BINARY}"; then
              echo "✅ entitlements 已注入"
            else
              echo "⚠️  ldid 注入失败，请手动执行:"
              echo "     ldid -S${ENTITLEMENTS} ${APP_BINARY}"
            fi
          else
            echo "⚠️  ldid 未安装或 entitlements 文件不存在，跳过注入"
            echo "     请确保通过 TrollStore 安装时手动注入权限"
          fi
        basedOnDependencyAnalysis: false
    # Info.plist 额外键值
    info:
      path: 无忧辅助/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSupportsIndirectInputEvents: true
        UIDeviceFamily: [1]
        UIRequiredDeviceCapabilities: [arm64, iphone-ipad]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        LSRequiresIPhoneOS: true
        MinimumOSVersion: "14.0"
