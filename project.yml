name: 无忧辅助
options:
  bundleIdPrefix: com.wuyou.helper
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "14.0"

settings:
  base:
    INFOPLIST_FILE: 无忧辅助/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.wuyou.helper
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_ENTITLEMENTS: entitlements.plist
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    OTHER_SWIFT_FLAGS: $(inherited) -suppress-warnings
    SWIFT_OBJC_BRIDGING_HEADER: 无忧辅助/无忧辅助-Bridging-Header.h
    HEADER_SEARCH_PATHS: $(inherited) $(SRCROOT)/lua-build/include
    LIBRARY_SEARCH_PATHS: $(inherited) $(SRCROOT)/lua-build/lib
    OTHER_LDFLAGS: $(inherited) -framework IOKit -framework CoreFoundation -framework CoreGraphics -framework IOSurface -framework UIKit -llua -Wl,-U,_IOMobileFramebufferGetMainDisplay -Wl,-U,_IOMobileFramebufferGetLayerDefaultSurface

targets:
  无忧辅助:
    type: application
    platform: iOS
    sources:
      - path: 无忧辅助
        type: group
      - path: roothelper
        type: group
        excludes:
          - "main.c"
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_NAME: 无忧辅助
        ENABLE_BITCODE: "NO"
        VALID_ARCHS: arm64
        ARCHS: arm64
        CLANG_ENABLE_MODULES: "YES"
        GCC_PREPROCESSOR_DEFINITIONS: $(inherited) LUA_USE_IOS=1
    preBuildScripts:
      - name: "Build Lua 5.4.7"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          LUA_VERSION="5.4.7"
          LUA_BUILD="${SRCROOT}/lua-build"

          if [ -f "${LUA_BUILD}/lib/liblua.a" ]; then
            echo "=== Lua already built, skipping ==="
            exit 0
          fi

          LUA_DIR="${SRCROOT}/lua-${LUA_VERSION}"

          if [ ! -d "${LUA_DIR}" ]; then
            echo "=== Downloading Lua ${LUA_VERSION} ==="
            curl -sL -o /tmp/lua-${LUA_VERSION}.tar.gz "https://www.lua.org/ftp/lua-${LUA_VERSION}.tar.gz"
            tar xzf /tmp/lua-${LUA_VERSION}.tar.gz -C "${SRCROOT}"
            rm -f /tmp/lua-${LUA_VERSION}.tar.gz
          fi

          echo "=== Compiling Lua ${LUA_VERSION} for arm64 ==="
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CFLAGS="-arch arm64 -isysroot ${SDK} -mios-version-min=14.0 -O2 -std=gnu11 -fPIC -DLUA_USE_IOS"

          mkdir -p "${LUA_BUILD}/lib" "${LUA_BUILD}/include"
          cd "${LUA_DIR}/src"

          OBJ_FILES=""
          for f in *.c; do
            if [ "$f" != "lua.c" ] && [ "$f" != "luac.c" ]; then
              obj="${LUA_BUILD}/${f%.c}.o"
              clang ${CFLAGS} -c "$f" -o "${obj}"
              OBJ_FILES="${OBJ_FILES} ${obj}"
            fi
          done

          ar rcs "${LUA_BUILD}/lib/liblua.a" ${OBJ_FILES}
          cp lua.h lualib.h lauxlib.h luaconf.h "${LUA_BUILD}/include/"

          # 清理 .o 文件
          rm -f ${OBJ_FILES}

          cd "${SRCROOT}"
          echo "=== Lua ${LUA_VERSION} built successfully ==="

      - name: "Copy roothelper"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          SRC="${SRCROOT}/roothelper"
          DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"

          echo "=== Building roothelper ==="
          cd "${SRC}"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CFLAGS="-arch arm64 -isysroot ${SDK} -mios-version-min=14.0 -O2 -std=gnu17"

          clang ${CFLAGS} -c kfd.c -o kfd.o
          clang ${CFLAGS} -c offsets.c -o offsets.o
          clang ${CFLAGS} -c main.c -o main.o
          
          echo "=== Linking roothelper (standalone executable) ==="
          clang ${CFLAGS} kfd.o offsets.o main.o -o roothelper -framework IOKit -framework CoreFoundation

          echo "=== Copying roothelper to app bundle ==="
          cp roothelper "${DST}/roothelper"
          chmod 755 "${DST}/roothelper"

          echo "=== Cleaning up ==="
          rm -f kfd.o offsets.o main.o roothelper

          echo "=== roothelper ready ==="
