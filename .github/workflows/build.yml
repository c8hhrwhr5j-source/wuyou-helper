name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ========================================
      # Step 1: 安装依赖
      # ========================================
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install ldid
        run: |
          # 直接通过 brew 安装 ldid（最稳定）
          brew install ldid
          ldid 2>&1 | head -1 || true

      # ========================================
      # Step 2: 编译 roothelper (C -> arm64)
      # ========================================
      - name: Build roothelper
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 \
            -isysroot "$SDK" \
            -mios-version-min=14.0 \
            -O2 \
            -framework IOKit \
            -framework CoreFoundation \
            -o roothelper/roothelper \
            roothelper/main.c \
            roothelper/kfd.c
          file roothelper/roothelper

      # ========================================
      # Step 3: 生成 Xcode 项目
      # ========================================
      - name: Generate Xcode project
        run: xcodegen generate

      # ========================================
      # Step 4: 编译 App (xcodebuild)
      # ========================================
      - name: Build App
        run: |
          # 检查必要文件是否存在
          echo "=== 检查文件 ==="
          ls -la 无忧辅助/Info.plist
          ls -la 无忧辅助/Assets.xcassets/ 2>/dev/null || echo "(Assets.xcassets 不存在)"
          ls -la 无忧辅助/LaunchScreen.storyboard 2>/dev/null || echo "(LaunchScreen.storyboard 不存在)"

          # 编译并捕获完整日志
          xcodebuild build \
            -project "无忧辅助.xcodeproj" \
            -scheme "无忧辅助" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -derivedDataPath ./DerivedData \
            ARCHS=arm64 \
            VALID_ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEPLOYMENT_POSTPROCESSING=NO \
            STRIP_SWIFT_SYMBOLS=YES \
            COPY_PHASE_STRIP=NO \
            2>&1 | tee build.log

          # 如果失败，输出错误摘要
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo ""
            echo "====== ERROR SUMMARY ======"
            grep -i -E "(error:|warning:|undefined|duplicate)" build.log | head -30
            echo "==========================="
            exit 1
          fi

      # ========================================
      # Step 5: 打包 IPA
      # ========================================
      - name: Package IPA
        run: |
          APP_PATH=$(find ./DerivedData -name "无忧辅助.app" -type d -maxdepth 6 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app!"
            find ./DerivedData -name "*.app" -type d
            exit 1
          fi
          echo "App: $APP_PATH"
          ls -la "$APP_PATH/"

          # 先移除 xcodebuild 的 ad-hoc 签名（否则 ldid 会崩溃）
          codesign --remove-signature "$APP_PATH/无忧辅助" 2>/dev/null || true
          codesign --remove-signature "$APP_PATH/roothelper" 2>/dev/null || true

          # 签名（用 ldid 注入 entitlements）
          ldid -S entitlements.plist "$APP_PATH/无忧辅助" || echo "⚠️ 主应用 ldid 签名失败（TrollStore 会处理）"
          ldid -S entitlements.plist "$APP_PATH/roothelper" || echo "⚠️ roothelper 签名失败"

          # 验证签名
          echo "=== 验证 entitlements ==="
          ldid -e "$APP_PATH/无忧辅助" 2>/dev/null | head -20 || echo "(TrollStore 安装时会自动注入权限)"


          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r 无忧辅助.ipa Payload/
          ls -lh 无忧辅助.ipa

      # ========================================
      # Step 6: 上传 IPA
      # ========================================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: 无忧辅助.ipa
          path: 无忧辅助.ipa
