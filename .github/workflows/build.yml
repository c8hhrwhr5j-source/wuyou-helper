# ================================================================
# CI 设计说明
# ================================================================
# runs-on: macos-15 (Xcode 16.x, iOS 18 SDK)
# ── 为什么要锁定版本而不是用 macos-latest？
#    TrollStore 仅支持 iOS 14-17，不需要新 SDK。
#    macos-latest (当前 Xcode 26 / iOS 26 SDK) 已移除
#    kIOMasterPortDefault / mach_vm.h / IOMainPort 等 API。
#    锁定 macos-15 可以避免"每半年修一次 SDK 兼容"的循环。
#
# 何时需要升级 macos-××?
#    只有当旧版 runner 被 GitHub 彻底下架时才需要。
#    https://github.com/actions/runner-images
# ================================================================
name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ========================================
      # Step 1: 安装依赖
      # ========================================
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install ldid
        run: |
          # 直接通过 brew 安装 ldid（最稳定）
          brew install ldid
          ldid 2>&1 | head -1 || true

      # ========================================
      # Step 2: 编译 roothelper (C -> arm64)
      # ========================================
      - name: Build roothelper
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 \
            -isysroot "$SDK" \
            -mios-version-min=14.0 \
            -O2 \
            -o roothelper/roothelper \
            roothelper/main.c \
            roothelper/kfd.c \
            roothelper/offsets.c \
            -framework IOKit \
            -framework CoreFoundation
          file roothelper/roothelper

      # ========================================
      # Step 3: 生成 Xcode 项目
      # ========================================
      - name: Generate Xcode project
        run: xcodegen generate

      # ========================================
      # Step 4: 编译 App (xcodebuild)
      # ========================================
      - name: Build App
        run: |
          # 检查必要文件是否存在
          echo "=== 检查文件 ==="
          ls -la 无忧辅助/Info.plist
          ls -la 无忧辅助/Assets.xcassets/ 2>/dev/null || echo "(Assets.xcassets 不存在)"
          ls -la 无忧辅助/LaunchScreen.storyboard 2>/dev/null || echo "(LaunchScreen.storyboard 不存在)"

          # 编译（禁用 pipefail 以便捕获错误后继续诊断）
          # 注意：禁用 pipefail 后 $? 返回的是管道最后一个命令(tee)的退出码，
          # 必须用 ${PIPESTATUS[0]} 获取 xcodebuild 的真实退出码
          set +o pipefail
          xcodebuild build \
            -project "无忧辅助.xcodeproj" \
            -scheme "无忧辅助" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -derivedDataPath ./DerivedData \
            ARCHS=arm64 \
            VALID_ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEPLOYMENT_POSTPROCESSING=NO \
            STRIP_SWIFT_SYMBOLS=YES \
            COPY_PHASE_STRIP=NO \
            2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -o pipefail

          # 如果失败，输出错误摘要
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "====== LINKER ERRORS ======"
            grep -i -E "(Undefined symbols|undefined symbol|duplicate symbol|linker command failed|clang: error: linker)" build.log | head -50
            echo ""
            echo "====== COMPILE ERRORS ======"
            grep -i -E "(^.*: error:|^.*: fatal error:)" build.log | head -80
            echo ""
            echo "====== BUILD.LOG TAIL (150 lines) ======"
            tail -150 build.log
            echo "========================================"

            # 诊断性编译：仅对有编译错误的 .m 文件运行
            HAS_COMPILE_ERR=0
            SDK=$(xcrun --sdk iphoneos --show-sdk-path)
            for PATTERN in "TouchSimulation" "ScriptEngine" "ScreenCapture" "LuaBridge"; do
              if grep -q "${PATTERN}.o.*failed" build.log 2>/dev/null; then
                HAS_COMPILE_ERR=1
                FAILED_FILE="无忧辅助/${PATTERN}.m"
                if [ ! -f "$FAILED_FILE" ]; then
                  FAILED_FILE="${PATTERN}.m"
                fi
                LUA_INC=""
                case "$PATTERN" in
                  ScriptEngine|LuaBridge) LUA_INC="-I./lua-build/include" ;;
                esac
                echo ""
                echo "====== DIAGNOSTIC: $FAILED_FILE ======"
                clang -x objective-c -arch arm64 -isysroot "$SDK" -mios-version-min=14.0 \
                  -fobjc-arc -fmodules ${LUA_INC} -ferror-limit=0 \
                  -D LUA_USE_IOS=1 \
                  -I./无忧辅助 \
                  -framework Foundation -framework UIKit -framework CoreGraphics \
                  -framework CoreFoundation -framework IOKit -framework IOSurface \
                  -framework ImageIO -framework MobileCoreServices \
                  -c "$FAILED_FILE" -o /dev/null 2>&1 || true
                echo "======================================"
              fi
            done

            # 如果是纯链接错误（无编译错误），检查关键链接资源
            if [ $HAS_COMPILE_ERR -eq 0 ]; then
              echo ""
              echo "====== LINK DIAGNOSIS ======"
              echo "lua lib: $(ls -la lua-build/lib/liblua.a 2>/dev/null || echo 'MISSING!')"
              echo "kfd.o:   $(find ./DerivedData -name 'kfd.o' -type f 2>/dev/null | head -1 || echo 'MISSING!')"
              echo "offsets.o: $(find ./DerivedData -name 'offsets.o' -type f 2>/dev/null | head -1 || echo 'MISSING!')"
              echo ""
              # 也检查 C 文件是否有编译错误（kfd.c 用的 ObjC extern 可能会导致问题）
              echo "--- C file compile check ---"
              clang -x c -arch arm64 -isysroot "$SDK" -mios-version-min=14.0 \
                -I./roothelper -c roothelper/kfd.c -o /dev/null 2>&1 | head -20 || true
              clang -x c -arch arm64 -isysroot "$SDK" -mios-version-min=14.0 \
                -I./roothelper -c roothelper/offsets.c -o /dev/null 2>&1 | head -20 || true
            fi

            exit 1
          fi

          # 构建成功后验证产物
          echo ""
          echo "=== 验证构建产物 ==="
          APP_PATH=$(find ./DerivedData -name "无忧辅助.app" -type d -maxdepth 6 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 构建成功但未找到 .app bundle！"
            find ./DerivedData -type d -name "*.app" 2>/dev/null || echo "(无 .app)"
            exit 1
          fi
          echo "App bundle: $APP_PATH"
          APP_BIN="$APP_PATH/无忧辅助"
          if [ -f "$APP_BIN" ]; then
            echo "✅ 主二进制已生成: $(file "$APP_BIN")"
            ls -la "$APP_BIN"
          else
            echo "❌ 主二进制缺失！app bundle 内容："
            ls -laR "$APP_PATH/"
            echo ""
            echo "搜索 DerivedData 中的二进制文件："
            find ./DerivedData -name "无忧辅助" -type f 2>/dev/null || echo "(未找到)"
            exit 1
          fi

      # ========================================
      # Step 5: 打包 IPA
      # ========================================
      - name: Package IPA
        run: |
          APP_PATH=$(find ./DerivedData -name "无忧辅助.app" -type d -maxdepth 6 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app!"
            find ./DerivedData -name "*.app" -type d
            exit 1
          fi
          echo "App: $APP_PATH"

          # 完整列出 app bundle 内容（递归）
          echo "=== App Bundle 完整内容 ==="
          ls -laR "$APP_PATH/"
          echo "==========================="

          # 检查主二进制是否存在
          APP_BIN="$APP_PATH/无忧辅助"
          if [ ! -f "$APP_BIN" ]; then
            echo "❌ 主二进制文件不存在: $APP_BIN"
            echo "尝试搜索二进制文件..."
            find ./DerivedData -name "无忧辅助" -type f 2>/dev/null || echo "(未找到)"
            echo ""
            echo "=== build.log 尾部 100 行 ==="
            tail -100 build.log 2>/dev/null || echo "(build.log 不可用)"
            echo ""
            echo "=== build.log 错误摘要 ==="
            grep -i -E "(error:|warning:|^ld:|Undefined|linker command failed)" build.log 2>/dev/null | tail -30 || echo "(无匹配)"
            exit 1
          fi

          ls -la "$APP_BIN"

          # 先移除 xcodebuild 的 ad-hoc 签名（否则 ldid 会崩溃）
          codesign --remove-signature "$APP_BIN" 2>/dev/null || true
          codesign --remove-signature "$APP_PATH/roothelper" 2>/dev/null || true

          # 签名（用 ldid 注入 entitlements）— 注意：-S 后不要加空格！
          echo "🔏 注入主应用 entitlements..."
          ldid -S"entitlements.plist" "$APP_BIN" || {
            echo "❌ 主应用 ldid 注入失败"
            exit 1
          }

          echo "🔏 注入 roothelper entitlements..."
          ldid -S"entitlements.plist" "$APP_PATH/roothelper" || {
            echo "❌ roothelper ldid 注入失败"
            exit 1
          }

          # 验证签名：必须包含全部关键私有 entitlements
          echo "=== 验证 entitlements 注入 ==="
          ENTITLEMENTS_OUTPUT=$(ldid -e "$APP_BIN" 2>/dev/null || true)
          echo "$ENTITLEMENTS_OUTPUT"

          FAIL=0
          for key in \
            "com.apple.private.security.no-sandbox" \
            "com.apple.private.security.no-container" \
            "platform-application" \
            "com.apple.private.iomobileframebuffer.access" \
            "com.apple.private.screencapture.capture-all-displays" \
            "com.apple.private.iohid.event-system" \
            "com.apple.private.tcc.allow" \
            "com.apple.security.exception.files.absolute-path.read-write"; do
            label=$(echo "$key" | sed 's/.*\.//')
            if echo "$ENTITLEMENTS_OUTPUT" | grep -qF "$key"; then
              echo "    ✅ $label"
            else
              echo "    ❌ $label 缺失!"
              FAIL=1
            fi
          done
          if [ $FAIL -ne 0 ]; then
            echo "❌ 验证失败：关键 entitlements 缺失"
            exit 1
          fi
          echo "✅ entitlements 验证通过 (8/8)"

          # 验证版本号
          echo "=== 验证版本号 ==="
          PLIST_VERSION=$(plutil -extract CFBundleShortVersionString raw "$APP_PATH/Info.plist" 2>/dev/null || echo "unknown")
          echo "版本: $PLIST_VERSION"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r 无忧辅助.ipa Payload/
          ls -lh 无忧辅助.ipa

      # ========================================
      # Step 6: 上传 IPA
      # ========================================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: 无忧辅助.ipa
          path: 无忧辅助.ipa
